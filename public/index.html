<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function redirectIphoneToMobileView() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('desktop') === '1') return;

            const ua = navigator.userAgent || '';
            const isiPhone = /iPhone/i.test(ua);
            if (!isiPhone) return;

            const targetUrl = new URL('iphone.html', window.location.href);
            targetUrl.search = window.location.search;
            targetUrl.hash = window.location.hash;
            window.location.replace(targetUrl.toString());
        })();
    </script>

    <!-- Import map for supported local browser modules -->
    <script type="importmap">
{
  "imports": {
    "react": "/vendor/react.mjs",
    "react/jsx-runtime": "/vendor/react-jsx-runtime.mjs",
    "react-dom/client": "/vendor/react-dom-client.mjs",

    <script src="/vendor/babel.min.js"></script>
    <link rel="stylesheet" href="/vendor/uploaded-jsx-utilities.css">
    <style>
        :root {
            --viewer-bg: #f4f4f9;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--viewer-bg);
        }

        #top-bar {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(224, 224, 224, 0.5);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transition: opacity 0.3s, transform 0.3s, visibility 0.3s;
            box-sizing: border-box;
            width: 360px;
            max-width: calc(100vw - 48px);
        }

        #top-bar.upload-open {
            width: 360px;
        }

        #top-bar.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .panel-header span {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        #minimize-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 20px;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s;
            margin: 0;
        }

        #minimize-btn:hover {
            color: #000;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .panel-row label {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .upload-section {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 12px;
            display: grid;
            gap: 10px;
        }

        .upload-section.hidden {
            display: none;
        }

        .upload-dropzone {
            border: 1px dashed rgba(108, 61, 255, 0.45);
            border-radius: 8px;
            padding: 14px;
            background: rgba(108, 61, 255, 0.06);
            color: #3f365f;
            cursor: pointer;
            display: grid;
            gap: 4px;
            transition: border-color 0.2s, background 0.2s;
        }

        .upload-dropzone.drag-over {
            border-color: #6c3dff;
            background: rgba(108, 61, 255, 0.12);
        }

        .upload-title {
            font-weight: 600;
            font-size: 14px;
        }

        .upload-hint,
        .upload-status {
            color: #5d6473;
            font-size: 12px;
            line-height: 1.35;
        }

        .upload-file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 4px;
            max-height: 96px;
            overflow: auto;
        }

        .upload-file-list li {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 6px;
            color: #333;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            overflow: hidden;
            padding: 6px 8px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .upload-error {
            color: #b42318;
            background: #fff1f0;
            border: 1px solid #ffccc7;
            border-radius: 6px;
            display: none;
            font-size: 12px;
            line-height: 1.35;
            padding: 8px;
        }

        .upload-error.visible {
            display: block;
        }

        #top-bar select,
        #top-bar input {
            box-sizing: border-box;
            padding: 8px 12px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
        }

        #jsx-select {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #top-bar button:not(#minimize-btn) {
            padding: 8px 16px;
            background: #6c3dff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        #top-bar button:not(#minimize-btn):hover {
            background: #5a2bd1;
        }

        #reset-btn {
            background: #5f6575;
        }

        #reset-btn:hover {
            background: #4f5566;
        }

        #copy-link-btn {
            background: #137c50;
        }

        #copy-link-btn:hover {
            background: #0f6944;
        }

        #upload-toggle-btn {
            background: #2f6fed;
        }

        #upload-toggle-btn:hover {
            background: #255fce;
        }

        #upload-submit-btn:disabled {
            background: #9aa3b2;
            cursor: not-allowed;
        }

        #share-url {
            display: none;
        }

        #root {
            min-height: 100vh;
            padding-bottom: 100px;
            background: var(--viewer-bg);
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 16px;
            margin: 20px;
            border-radius: 8px;
            border: 1px solid #ffcdd2;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .loading {
            padding: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="top-bar" class="hidden">
        <div class="panel-header">
            <span>Controls</span>
            <button id="minimize-btn" title="Minimize">&minus;</button>
        </div>
        <div class="panel-row">
            <label for="jsx-select" style="font-weight: 500; font-size: 14px; color: #333;">Load Component:</label>
            <select id="jsx-select"></select>
        </div>
        <div class="panel-row" style="justify-content: flex-start; gap: 8px;">
            <button id="reset-btn" type="button">Reset</button>
            <button id="copy-link-btn" type="button">Copy Link</button>
            <button id="upload-toggle-btn" type="button">Upload</button>
        </div>
        <div id="upload-section" class="upload-section hidden">
            <input id="upload-input" type="file" accept=".jsx,.mjs" multiple hidden />
            <div id="upload-dropzone" class="upload-dropzone" role="button" tabindex="0"
                aria-label="Upload JSX and MJS files">
                <span class="upload-title">Drop .jsx and .mjs files</span>
                <span class="upload-hint">Use one JSX component plus any flat local MJS logic imports.</span>
            </div>
            <ul id="upload-file-list" class="upload-file-list"></ul>
            <div id="upload-error" class="upload-error"></div>
            <div id="upload-status" class="upload-status">No files selected.</div>
            <div class="panel-row" style="justify-content: flex-start; gap: 8px;">
                <button id="upload-submit-btn" type="button" disabled>Upload to R2</button>
                <button id="upload-clear-btn" type="button">Clear</button>
            </div>
        </div>
        <input type="text" id="share-url" readonly placeholder="Shareable link will appear here" />
    </div>
    <div id="root"></div>

    <script type="module">
        import React from 'react';
        import { initViewer } from './viewer-shared.mjs';

        window.React = React;

        initViewer({
            isMobile: false,
            defaultPageBg: '#f4f4f9',
            selectLabelMinLength: 24,
            selectLabelMaxLength: 44,
            selectLabelHorizontalChrome: 38
        });
    </script>
</body>

</html>
